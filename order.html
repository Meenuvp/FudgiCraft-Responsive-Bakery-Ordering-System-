<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Place Your Order - FudgiCraft</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand"><img src="assets/images/logo.jpeg" class="rounded-circle" alt="Logo" width="100"></a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link active" href="order.html">Order</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>
  <div class="container my-5">
    <h2 class="text-center mb-4">Place Your Order</h2>
    <form action="save_order.php" method="POST">
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" name="name" id="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="text" name="phone" id="phone" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control">
      </div>
      <div class="mb-3">
        <label for="address" class="form-label">Address</label>
        <textarea name="address" id="address" class="form-control" required></textarea>
      </div>
      <div class="mb-3">
        <h5>Select Brownies and Quantity</h5>
        <div class="form-check">
          <input type="checkbox" name="brownies[]" value="Classic Brownie" class="form-check-input" id="classic">
          <label for="classic" class="form-check-label">Classic Brownie</label>
          <input type="number" name="qty[]" min="0" value="0" class="form-control w-25 d-inline-block ms-2">
        </div>
        <div class="form-check">
          <input type="checkbox" name="brownies[]" value="Nutella Brownie" class="form-check-input" id="nutella">
          <label for="nutella" class="form-check-label">Nutella Brownie</label>
          <input type="number" name="qty[]" min="0" value="0" class="form-control w-25 d-inline-block ms-2">
        </div>
        <div class="form-check">
          <input type="checkbox" name="brownies[]" value="Cheesecake Brownie" class="form-check-input" id="cheesecake">
          <label for="cheesecake" class="form-check-label">Cheesecake Brownie</label>
          <input type="number" name="qty[]" min="0" value="0" class="form-control w-25 d-inline-block ms-2">
        </div>
        <div class="form-check">
          <input type="checkbox" name="brownies[]" value="Lotus Biscoff Brownie" class="form-check-input" id="lotus">
          <label for="lotus" class="form-check-label">Lotus Biscoff Brownie</label>
          <input type="number" name="qty[]" min="0" value="0" class="form-control w-25 d-inline-block ms-2">
        </div>
        <div class="form-check">
          <input type="checkbox" name="brownies[]" value="Walnut Brownie" class="form-check-input" id="lotus">
          <label for="lotus" class="form-check-label">Walnut Brownie</label>
          <input type="number" name="qty[]" min="0" value="0" class="form-control w-25 d-inline-block ms-2">
        </div>
        <div class="form-check">
          <input type="checkbox" name="brownies[]" value="Triple Chocolate Brownie" class="form-check-input" id="lotus">
          <label for="lotus" class="form-check-label">Triple Chocolate Brownie</label>
          <input type="number" name="qty[]" min="0" value="0" class="form-control w-25 d-inline-block ms-2">
        </div>
      </div>
      <div class="mb-3">
        <label for="assorted_box" class="form-label">Assorted Box (Optional Notes)</label>
        <textarea name="assorted_box" id="assorted_box" class="form-control"></textarea>
      </div>
      <button type="submit" class="btn btn-dark w-100">Submit Order</button>
    </form>
  </div>
</body>

</html>
